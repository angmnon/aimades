name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Patch OpenNext to externalize pg-cloudflare
        run: |
          FILE=$(find node_modules -path "*/@opennextjs/cloudflare/dist/cli/build/bundle-server.js")
          sed -i "s|external: \["./middleware/handler.mjs"\]|external: ["./middleware/handler.mjs", "pg-cloudflare"]|" "$FILE"

      - name: Build with OpenNext Cloudflare
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
