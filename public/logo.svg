<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="madesLogoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="madesLogoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Mark: stylized M formed by two converging machined beams + hex nut silhouette -->
  <g transform="translate(2,2)" filter="url(#madesLogoGlow)">
    <!-- hex nut outer -->
    <polygon points="22,2 38,11 38,29 22,38 6,29 6,11" fill="none" stroke="url(#madesLogoGrad)" stroke-width="1.5"/>
    <!-- inner circle -->
    <circle cx="22" cy="20" r="7" fill="none" stroke="url(#madesLogoGrad)" stroke-width="1.2" opacity="0.8"/>
    <!-- M beams converging to a center line -->
    <path d="M10 30 L16 12 L22 22 L28 12 L34 30" fill="none" stroke="url(#madesLogoGrad)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- center pulse dot -->
    <circle cx="22" cy="20" r="2" fill="#22D3EE">
      <animate attributeName="r" values="1.6;2.6;1.6" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Wordmark -->
  <g transform="translate(54,0)" font-family="'Space Grotesk','Inter',sans-serif" font-weight="700" letter-spacing="4">
    <text x="0" y="31" font-size="26" fill="#F5F7FA">MADES</text>
    <text x="0" y="43" font-size="8" fill="#22D3EE" letter-spacing="6" font-family="'JetBrains Mono',monospace">INDUSTRIAL WORLD MODEL</text>
  </g>
</svg>
